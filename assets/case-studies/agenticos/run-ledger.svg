<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">AgenticOS run ledger</title>
  <desc id="desc">A simplified run ledger showing missions, evidence artifacts, blockers, and next actions.</desc>
  <rect width="960" height="600" fill="#0b0b0b"/>
  <rect x="42" y="42" width="876" height="516" fill="#111" stroke="#c89a3a" stroke-width="2"/>
  <text x="72" y="92" fill="#f7f1df" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">work/run-ledger.jsonl</text>
  <text x="72" y="130" fill="#c89a3a" font-family="Menlo, Consolas, monospace" font-size="15">Every useful run leaves a durable trail</text>
  <line x1="72" y1="158" x2="888" y2="158" stroke="#c89a3a" stroke-opacity=".65"/>
  <g font-family="Menlo, Consolas, monospace" font-size="15" fill="#f7f1df">
    <text x="72" y="210">agent: Loki</text>
    <text x="72" y="240">mission: TideFlow prospect refinement</text>
    <text x="72" y="270">artifactPath: reports/tideflow/latest.md</text>
    <text x="72" y="300">resultStatus: completed_with_blockers</text>
    <text x="72" y="350">agent: Botler</text>
    <text x="72" y="380">mission: founder digest</text>
    <text x="72" y="410">approvalLevel: report only</text>
    <text x="72" y="440">nextAction: bounded repair windows, then force source truth</text>
  </g>
  <g fill="none" stroke="#c89a3a" stroke-opacity=".48">
    <circle cx="760" cy="226" r="46"/>
    <circle cx="760" cy="382" r="46"/>
    <path d="M760 272v64"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" font-size="13" fill="#c89a3a">
    <text x="722" y="231">record</text>
    <text x="724" y="387">review</text>
  </g>
</svg>
